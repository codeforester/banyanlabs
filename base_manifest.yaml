schema_version: 1

project:
  # Project name used by Base for setup logs and the project virtual
  # environment at ~/.base.d/<project>/.venv.
  name: banyanlabs

# Banyan Labs is expected to grow into a multi-service repo with Go, Java, and
# Python components. Base delegates ordinary workstation tools to Homebrew and
# language/runtime versions to mise.

brewfile: Brewfile

mise: .mise.toml

test:
  mise: test

commands:
  api-test: mise run api-test
  build: mise run build
  dev: mise run dev
  status: mise run status
  stop: mise run stop

artifacts:
  # Python tooling for Banyan Labs automation, tests, and service support.
  - type: python-package
    name: pylint
    version: latest

  - type: python-package
    name: pytest
    version: latest

  - type: python-package
    name: requests
    version: latest
