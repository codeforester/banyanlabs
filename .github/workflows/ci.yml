name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # ─── Python ───────────────────────────────────────────────
  python:
    name: Python – Lint, Test, Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff pytest build

      - name: Lint (ruff)
        run: ruff check .

      - name: Test (pytest)
        run: pytest

      - name: Build package
        run: python -m build

  # ─── Go ───────────────────────────────────────────────────
  go:
    name: Go – Lint, Test, Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Lint (go vet)
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build
        run: go build ./...

  # ─── Shell Scripts ────────────────────────────────────────
  shell:
    name: Shell – Lint (shellcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Lint shell scripts
        run: find . -name "*.sh" -exec shellcheck {} +
