name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ─── Python ───────────────────────────────────────────────
  python:
    name: Python – Lint, Test, Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect Python project
        id: python_project
        shell: bash
        run: |
          if [[ -f pyproject.toml || -f setup.py || -f setup.cfg || -f requirements.txt ]]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "No Python project files found; skipping Python CI."
          fi

      - name: Set up Python
        if: steps.python_project.outputs.present == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        if: steps.python_project.outputs.present == 'true'
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [[ -f requirements.txt ]]; then
            pip install -r requirements.txt
          fi
          pip install ruff pytest build

      - name: Lint (ruff)
        if: steps.python_project.outputs.present == 'true'
        run: ruff check .

      - name: Test (pytest)
        if: steps.python_project.outputs.present == 'true'
        run: pytest

      - name: Build package
        if: steps.python_project.outputs.present == 'true' && hashFiles('pyproject.toml', 'setup.py') != ''
        run: python -m build

  # ─── Go ───────────────────────────────────────────────────
  go:
    name: Go – Lint, Test, Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect Go project
        id: go_project
        shell: bash
        run: |
          if [[ -f go.mod ]]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "No go.mod found; skipping Go CI."
          fi

      - name: Set up Go
        if: steps.go_project.outputs.present == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Lint (go vet)
        if: steps.go_project.outputs.present == 'true'
        run: go vet ./...

      - name: Test
        if: steps.go_project.outputs.present == 'true'
        run: go test ./...

      - name: Build
        if: steps.go_project.outputs.present == 'true'
        run: go build ./...

  # ─── Shell Scripts ────────────────────────────────────────
  shell:
    name: Shell – Lint (shellcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shell tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y bats shellcheck zsh

      - name: Lint shell scripts
        shell: bash
        run: |
          if [[ ! -d cli ]]; then
            echo "No cli directory found; skipping shell lint."
            exit 0
          fi

          mapfile -t shell_files < <(
            find cli \
              -type f \
              \( -name "*.sh" -o -name "bash-wrapper" \) \
              -print | sort
          )

          if ((${#shell_files[@]} == 0)); then
            echo "No shell scripts found."
            exit 0
          fi

          shellcheck -x -e SC1090,SC1091 "${shell_files[@]}"

      - name: Run Bash tests
        shell: bash
        run: |
          if [[ ! -d cli ]]; then
            echo "No cli directory found; skipping Bash tests."
            exit 0
          fi

          mapfile -t bats_files < <(find cli -type f -name "*.bats" -print | sort)
          if ((${#bats_files[@]} == 0)); then
            echo "No BATS tests found."
            exit 0
          fi

          bats "${bats_files[@]}"
