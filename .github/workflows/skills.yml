name: Skills Document

on:
  pull_request:
    paths:
      - "skills.md"
      - ".github/workflows/skills.yml"
  push:
    paths:
      - "skills.md"
      - ".github/workflows/skills.yml"
  workflow_dispatch:
    inputs:
      create_pr:
        description: "Create a pull request when skills.md is missing"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

jobs:
  validate:
    name: Validate skills.md
    if: github.event_name != 'workflow_dispatch' || inputs.create_pr != 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check required sections
        run: |
          if [[ ! -f skills.md ]]; then
            echo "skills.md is not present yet; skipping validation."
            exit 0
          fi

          grep -q '^# Skills$' skills.md
          grep -q '^## Add a Banyan Labs service$' skills.md
          grep -q '^## Add or change project tooling$' skills.md
          grep -q '^## Change GitHub workflow behavior$' skills.md
          grep -q '^## Release-facing changes$' skills.md

  create:
    name: Create skills.md PR
    if: github.event_name == 'workflow_dispatch' && inputs.create_pr == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Create starter skills.md when missing
        run: |
          if [[ -f skills.md ]]; then
            echo "skills.md already exists; nothing to create."
            exit 0
          fi

          cat > skills.md <<'EOF'
          # Skills

          This file documents repeatable AI-assisted development workflows for
          Banyan Labs. General workflow context lives in `CONTRIBUTING.md` and
          `docs/github-workflow.md`.

          ## Add a Banyan Labs service

          Use this workflow when adding or changing a Go, Java, or Python-backed
          service.

          - Keep service code, tests, and service-local documentation together.
          - Add or update CI coverage for the service language.
          - Keep shared workspace setup in Base, not in Banyan Labs.

          ## Add or change project tooling

          Use this workflow when changing `base_manifest.yaml`, test tooling, or
          project-level developer dependencies.

          ## Change GitHub workflow behavior

          Use this workflow when changing issues, PRs, labels, CODEOWNERS, or
          GitHub Actions.

          ## Release-facing changes

          Use this workflow when changing versioning, packaging, deployment, or
          release notes.
          EOF

          sed -i 's/^          //' skills.md

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet -- skills.md; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push starter file
        if: steps.changes.outputs.changed == 'true'
        id: commit
        run: |
          branch="codex/create-skills-md-${GITHUB_RUN_ID}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$branch"
          git add skills.md
          git commit -m "Add skills.md"
          git push origin "$branch"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"

      - name: Open pull request
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cat > pr-body.md <<'EOF'
          Add a root `skills.md` file with starter AI-assisted development
          workflows for Banyan Labs.

          This PR was generated by the Skills Document workflow.
          EOF
          gh pr create \
            --draft \
            --base "${GITHUB_REF_NAME}" \
            --head "${{ steps.commit.outputs.branch }}" \
            --title "[codex] Add skills.md" \
            --body-file pr-body.md
