[tools]
go = "1.22"

[env]
CGO_ENABLED = "0"

[tasks.test]
description = "Run Banyan Labs validation and service tests"
run = "tests/validate.sh && cd services/url-shortener && go test ./... && cd ../.. && tests/api/run.sh"

[tasks.build]
description = "Build the URL shortener service"
run = "cd services/url-shortener && go build ./..."

[tasks.dev]
description = "Start the URL shortener service locally"
run = "scripts/services.sh dev"

[tasks.api-test]
description = "Run URL shortener black-box API smoke tests"
run = "tests/api/run.sh"

[tasks.status]
description = "List local Banyan Labs service status"
run = "scripts/services.sh status"

[tasks.stop]
description = "Stop background Banyan Labs services"
run = "scripts/services.sh stop"
