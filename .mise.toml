[tools]
go = "1.22"

[env]
CGO_ENABLED = "0"

[tasks.test]
description = "Run Banyan Labs validation and service tests"
run = "tests/validate.sh && cd services/url-shortener && go test ./..."

[tasks.build]
description = "Build the URL shortener service"
run = "cd services/url-shortener && go build ./..."

[tasks.dev]
description = "Run the URL shortener service locally"
run = "cd services/url-shortener && go run ./cmd/url-shortener"
